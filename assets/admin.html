<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="国文汇通 - 资料管理后台，管理文档上传、上架、下架、删除等操作。">
    <meta name="robots" content="noindex, nofollow">
    <title>国文汇通 - 资料管理后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --light: #e2e8f0;
            --lighter: #f8fafc;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(26, 26, 46, 0.8);
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: var(--darker);
            color: var(--light);
            min-height: 100vh;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 35px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card h3 {
            font-size: 42px;
            margin: 10px 0;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card p {
            font-size: 14px;
            color: var(--light);
            opacity: 0.8;
            font-weight: 500;
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* 操作面板 */
        .action-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .panel-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--light);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--light);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(226, 232, 240, 0.4);
        }

        /* 搜索和筛选 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--light);
            font-size: 14px;
        }

        .filter-bar input {
            flex: 1;
            min-width: 250px;
        }

        /* 资料表格 */
        .documents-table {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            padding: 15px;
            text-align: left;
            background: rgba(102, 126, 234, 0.15);
            font-weight: 600;
            color: var(--primary-light);
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            white-space: nowrap;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--dark);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-size: 22px;
            color: var(--light);
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--light);
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 20px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .toast-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 14px;
            opacity: 0.7;
        }

        /* 批量操作 */
        .batch-actions {
            display: none;
            padding: 15px 20px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .batch-actions.active {
            display: flex;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                justify-content: center;
                padding: 12px 20px;
                font-size: 14px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-bar input {
                min-width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }

        /* 登录模态框 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-content {
            background: var(--dark);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-body .form-group {
            margin-bottom: 20px;
        }

        .login-body input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .login-body input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        /* 配置标签页 */
        .config-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .config-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .config-tab.active {
            background: var(--gradient);
            border-color: transparent;
        }

        .config-panel {
            display: none;
        }

        .config-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--gradient);
            border-color: transparent;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <!-- 登录模态框 -->
    <div class="login-modal" id="loginModal">
        <div class="login-content">
            <div class="login-header">
                <h2>🔐 管理员登录</h2>
                <p style="opacity: 0.7; font-size: 14px;">请输入管理员密码访问后台</p>
            </div>
            <div class="login-body">
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" onkeypress="handleLoginKeypress(event)">
                </div>
                <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-top: 15px;">登录</button>
                <p id="loginError" style="color: var(--danger); font-size: 13px; margin-top: 10px; display: none;"></p>
            </div>
        </div>
    </div>

    <div class="container" id="adminContent" style="display: none;">
        <!-- 头部 -->
        <div class="header">
            <h1>⚙️ 国文汇通 - 资料管理后台</h1>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">🌐 返回浏览页</a>
                <button onclick="openConfigModal()" class="btn btn-info">⚙️ 站点配置</button>
                <button onclick="openUploadModal()" class="btn btn-primary">📤 上传新资料</button>
                <button onclick="logout()" class="btn btn-danger">🚪 退出</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <h3 id="totalCount">0</h3>
                <p>总资料数</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <h3 id="activeCount">0</h3>
                <p>已上架</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❌</div>
                <h3 id="inactiveCount">0</h3>
                <p>已下架</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <h3 id="totalSize">0 MB</h3>
                <p>总存储</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬇️</div>
                <h3 id="totalDownloads">0</h3>
                <p>总下载</p>
            </div>
        </div>

        <!-- 批量操作 -->
        <div class="batch-actions" id="batchActions">
            <span>已选择 <strong id="selectedCount">0</strong> 项</span>
            <div class="header-actions">
                <button onclick="batchStatusChange('active')" class="btn btn-success btn-sm">批量上架</button>
                <button onclick="batchStatusChange('inactive')" class="btn btn-warning btn-sm">批量下架</button>
                <button onclick="batchDelete()" class="btn btn-danger btn-sm">批量删除</button>
                <button onclick="clearSelection()" class="btn btn-secondary btn-sm">取消选择</button>
            </div>
        </div>

        <!-- 资料列表 -->
        <div class="documents-table">
            <div class="panel-header">
                <h2>📚 资料列表</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 14px;">
                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                        全选
                    </label>
                </div>
            </div>
            
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍 搜索资料..." oninput="searchDocuments()">
                <select id="categoryFilter" onchange="filterByCategory()" style="min-width: 150px;">
                    <option value="">全部分类</option>
                    <option value="产品白皮书">产品白皮书</option>
                    <option value="技术文档">技术文档</option>
                    <option value="用户手册">用户手册</option>
                    <option value="API文档">API文档</option>
                    <option value="设计规范">设计规范</option>
                    <option value="案例分析">案例分析</option>
                    <option value="解决方案">解决方案</option>
                </select>
                <select id="statusFilter" onchange="filterByStatus()" style="min-width: 150px;">
                    <option value="">全部状态</option>
                    <option value="active">已上架</option>
                    <option value="inactive">已下架</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">选择</th>
                        <th style="width: 80px;">ID</th>
                        <th>标题</th>
                        <th style="width: 120px;">分类</th>
                        <th style="width: 100px;">大小</th>
                        <th style="width: 100px;">下载</th>
                        <th style="width: 100px;">状态</th>
                        <th style="width: 220px;">操作</th>
                    </tr>
                </thead>
                <tbody id="documentsTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 上传模态框 -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📤 上传新资料</h3>
                <button class="close-btn" onclick="closeModal('uploadModal')">&times;</button>
            </div>
            <form id="uploadForm">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="uploadTitle" required placeholder="请输入资料标题">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>文件路径/URL *</label>
                        <input type="text" id="uploadFilePath" required placeholder="本地路径或URL地址">
                    </div>
                    <div class="form-group">
                        <label>分类 *</label>
                        <select id="uploadCategory" required>
                            <option value="">选择分类</option>
                            <option value="产品白皮书">产品白皮书</option>
                            <option value="技术文档">技术文档</option>
                            <option value="用户手册">用户手册</option>
                            <option value="API文档">API文档</option>
                            <option value="设计规范">设计规范</option>
                            <option value="案例分析">案例分析</option>
                            <option value="解决方案">解决方案</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>标签</label>

    <script>
        // 模拟数据存储
        let documents = [];
        let selectedDocuments = new Set();
        let currentCategory = '';
        let currentStatus = '';

        // 加载文档数据
        async function loadDocuments() {
            try {
                const response = await fetch('guowen_huitong_data.json');
                const data = await response.json();
                documents = data.documents || [];
                updateStatistics();
                renderDocumentsTable();
            } catch (error) {
                console.error('加载文档失败:', error);
                showToast('加载文档失败，请刷新页面重试', 'error');
                documents = [];
            }
        }

        // 更新统计信息
        function updateStatistics() {
            const total = documents.length;
            const active = documents.filter(d => d.status === 'active').length;
            const inactive = documents.filter(d => d.status === 'inactive').length;
            const totalSize = documents.reduce((sum, d) => sum + (d.file_size || 0), 0);
            const totalDownloads = documents.reduce((sum, d) => sum + (d.download_count || 0), 0);

            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('inactiveCount').textContent = inactive;
            document.getElementById('totalSize').textContent = formatFileSize(totalSize);
            document.getElementById('totalDownloads').textContent = totalDownloads.toLocaleString();
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // 渲染文档表格
        function renderDocumentsTable(filteredDocs = null) {
            const tbody = document.getElementById('documentsTableBody');
            const docs = filteredDocs || documents;

            if (docs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <h3>暂无资料</h3>
                                <p>没有找到符合条件的资料</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = docs.map(doc => `
                <tr>
                    <td>
                        <input type="checkbox" 
                            onchange="toggleSelection('${doc.id}')" 
                            ${selectedDocuments.has(doc.id) ? 'checked' : ''}>
                    </td>
                    <td><code>${doc.id.slice(0, 8)}</code></td>
                    <td>
                        <div style="font-weight: 600; margin-bottom: 4px;">${escapeHtml(doc.title)}</div>
                        <div style="font-size: 12px; opacity: 0.7;">${doc.tags ? doc.tags.slice(0, 30) + (doc.tags.length > 30 ? '...' : '') : '无标签'}</div>
                    </td>
                    <td>${escapeHtml(doc.category || '-')}</td>
                    <td>${formatFileSize(doc.file_size || 0)}</td>
                    <td>${(doc.download_count || 0).toLocaleString()}</td>
                    <td>
                        <span class="status-badge ${doc.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${doc.status === 'active' ? '✅ 已上架' : '❌ 已下架'}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-success" onclick="changeStatus('${doc.id}')">
                                ${doc.status === 'active' ? '下架' : '上架'}
                            </button>
                            <button class="btn btn-sm btn-secondary" onclick="openEditModal('${doc.id}')">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDocument('${doc.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 搜索文档
        function searchDocuments() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilters(query);
        }

        // 按分类筛选
        function filterByCategory() {
            currentCategory = document.getElementById('categoryFilter').value;
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilters(query);
        }

        // 按状态筛选
        function filterByStatus() {
            currentStatus = document.getElementById('statusFilter').value;
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            applyFilters(query);
        }

        // 应用所有筛选
        function applyFilters(query) {
            let filtered = documents;

            // 关键词筛选
            if (query) {
                filtered = filtered.filter(doc => {
                    return (doc.title && doc.title.toLowerCase().includes(query)) ||
                           (doc.description && doc.description.toLowerCase().includes(query)) ||
                           (doc.tags && doc.tags.toLowerCase().includes(query));
                });
            }

            // 分类筛选
            if (currentCategory) {
                filtered = filtered.filter(doc => doc.category === currentCategory);
            }

            // 状态筛选
            if (currentStatus) {
                filtered = filtered.filter(doc => doc.status === currentStatus);
            }

            renderDocumentsTable(filtered);
        }

        // 打开上传模态框
        function openUploadModal() {
            document.getElementById('uploadForm').reset();
            openModal('uploadModal');
        }

        // 上传资料
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fileSizeMB = parseFloat(document.getElementById('uploadFileSize').value) || 1;
            
            const newDoc = {
                id: Date.now().toString(),
                title: document.getElementById('uploadTitle').value,
                file_path: document.getElementById('uploadFilePath').value,
                file_url: document.getElementById('uploadFilePath').value,
                category: document.getElementById('uploadCategory').value,
                tags: document.getElementById('uploadTags').value,
                description: document.getElementById('uploadDescription').value,
                file_size: fileSizeMB * 1024 * 1024,
                download_count: 0,
                status: 'active',
                created_at: new Date().toISOString()
            };

            documents.unshift(newDoc);
            updateStatistics();
            renderDocumentsTable();
            closeModal('uploadModal');
            showToast('✅ 资料上传成功！', 'success');
        });

        // 打开编辑模态框
        function openEditModal(docId) {
            const doc = documents.find(d => d.id === docId);
            if (!doc) return;

            document.getElementById('editDocId').value = doc.id;
            document.getElementById('editTitle').value = doc.title;
            document.getElementById('editFilePath').value = doc.file_path || '';
            document.getElementById('editCategory').value = doc.category || '';
            document.getElementById('editTags').value = doc.tags || '';
            document.getElementById('editFileSize').value = (doc.file_size / 1024 / 1024).toFixed(2);
            document.getElementById('editDescription').value = doc.description || '';

            openModal('editModal');
        }

        // 保存编辑
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const docId = document.getElementById('editDocId').value;
            const doc = documents.find(d => d.id === docId);
            
            if (doc) {
                doc.title = document.getElementById('editTitle').value;
                doc.file_path = document.getElementById('editFilePath').value;
                doc.file_url = document.getElementById('editFilePath').value;
                doc.category = document.getElementById('editCategory').value;
                doc.tags = document.getElementById('editTags').value;
                doc.file_size = parseFloat(document.getElementById('editFileSize').value) * 1024 * 1024;
                doc.description = document.getElementById('editDescription').value;

                updateStatistics();
                renderDocumentsTable();
                closeModal('editModal');
                showToast('✅ 资料更新成功！', 'success');
            }
        });

        // 改变状态
        function changeStatus(id) {
            const doc = documents.find(d => d.id === id);
            if (doc) {
                doc.status = doc.status === 'active' ? 'inactive' : 'active';
                updateStatistics();
                renderDocumentsTable();
                showToast(`资料已${doc.status === 'active' ? '上架' : '下架'}！`, 'success');
            }
        }

        // 删除资料
        function deleteDocument(id) {
            if (confirm('⚠️ 确定要删除这份资料吗？此操作无法撤销！')) {
                documents = documents.filter(d => d.id !== id);
                selectedDocuments.delete(id);
                updateBatchActions();
                updateStatistics();
                renderDocumentsTable();
                showToast('✅ 资料已删除！', 'success');
            }
        }

        // 选择/取消选择
        function toggleSelection(docId) {
            if (selectedDocuments.has(docId)) {
                selectedDocuments.delete(docId);
            } else {
                selectedDocuments.add(docId);
            }
            updateBatchActions();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('#documentsTableBody input[type="checkbox"]');
            
            checkboxes.forEach(cb => {
                cb.checked = selectAll.checked;
                const docId = cb.parentElement.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.querySelector('.btn-sm').getAttribute('onclick').match(/'([^']+)'/)[1];
                if (selectAll.checked) {
                    selectedDocuments.add(docId);
                } else {
                    selectedDocuments.delete(docId);
                }
            });
            
            updateBatchActions();
        }

        // 更新批量操作栏
        function updateBatchActions() {
            const batchActions = document.getElementById('batchActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (selectedDocuments.size > 0) {
                batchActions.classList.add('active');
                selectedCount.textContent = selectedDocuments.size;
            } else {
                batchActions.classList.remove('active');
            }
        }

        // 批量状态改变
        function batchStatusChange(newStatus) {
            if (confirm(`确定要批量${newStatus === 'active' ? '上架' : '下架'}选中的 ${selectedDocuments.size} 份资料吗？`)) {
                documents.forEach(doc => {
                    if (selectedDocuments.has(doc.id)) {
                        doc.status = newStatus;
                    }
                });
                clearSelection();
                updateStatistics();
                renderDocumentsTable();
                showToast(`✅ 批量${newStatus === 'active' ? '上架' : '下架'}成功！`, 'success');
            }
        }

        // 批量删除
        function batchDelete() {
            if (confirm(`⚠️ 确定要批量删除选中的 ${selectedDocuments.size} 份资料吗？此操作无法撤销！`)) {
                documents = documents.filter(doc => !selectedDocuments.has(doc.id));
                clearSelection();
                updateStatistics();
                renderDocumentsTable();
                showToast('✅ 批量删除成功！', 'success');
            }
        }

        // 清除选择
        function clearSelection() {
            selectedDocuments.clear();
            document.getElementById('selectAll').checked = false;
            updateBatchActions();
            renderDocumentsTable();
        }

        // 显示Toast通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');

            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️',
                warning: '⚠️'
            };

            icon.textContent = icons[type];
            msg.textContent = message;

            toast.className = `toast toast-${type} active`;

            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // 打开模态框
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.body.style.overflow = '';
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal(modal.id);
                }
            });
        });

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal').forEach(modal => {
                    if (modal.classList.contains('active')) {
                        closeModal(modal.id);
                    }
                });
            }
        });

        // ============ 登录相关 ============

        // 检查登录状态
        function checkLoginStatus() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else {
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
            }
        }

        // 登录
        function login() {
            const password = document.getElementById('adminPassword').value;
            const errorElement = document.getElementById('loginError');

            // 默认密码
            const correctPassword = 'admin888';

            if (password === correctPassword) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                showToast('登录成功！', 'success');
                errorElement.style.display = 'none';
            } else {
                errorElement.textContent = '密码错误，请重试';
                errorElement.style.display = 'block';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                sessionStorage.removeItem('adminLoggedIn');
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
                showToast('已退出登录', 'info');
            }
        }

        // 处理登录回车
        function handleLoginKeypress(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        // ============ 配置相关 ============

        let siteConfig = null;

        // 打开配置模态框
        async function openConfigModal() {
            await loadConfig();
            openModal('configModal');
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('site_config.json');
                siteConfig = await response.json();
                
                // 填充邀请配置
                document.getElementById('inviteEnabled').checked = siteConfig.invite.enabled;
                document.getElementById('inviteUrl').value = siteConfig.invite.url || '';
                document.getElementById('inviteButtonText').value = siteConfig.invite.buttonText || '';
                document.getElementById('inviteShowInHeader').checked = siteConfig.invite.showInHeader;

                // 填充客服配置
                document.getElementById('csEnabled').checked = siteConfig.customerService.enabled;

                if (siteConfig.customerService.services && siteConfig.customerService.services.length >= 2) {
                    const cs1 = siteConfig.customerService.services[0];
                    const cs2 = siteConfig.customerService.services[1];

                    document.getElementById('cs1Name').value = cs1.name || '';
                    document.getElementById('cs1Title').value = cs1.title || '';
                    document.getElementById('cs1Description').value = cs1.description || '';
                    document.getElementById('cs1Qrcode').value = cs1.qrcode || '';
                    document.getElementById('cs1Visible').checked = cs1.visible !== false;

                    document.getElementById('cs2Name').value = cs2.name || '';
                    document.getElementById('cs2Title').value = cs2.title || '';
                    document.getElementById('cs2Description').value = cs2.description || '';
                    document.getElementById('cs2Qrcode').value = cs2.qrcode || '';
                    document.getElementById('cs2Visible').checked = cs2.visible !== false;
                }

                // 填充站点信息
                document.getElementById('siteName').value = siteConfig.site.name || '';
                document.getElementById('siteDescription').value = siteConfig.site.description || '';
                document.getElementById('siteKeywords').value = siteConfig.site.keywords || '';
                document.getElementById('siteDomain').value = siteConfig.site.domain || '';

            } catch (error) {
                console.error('加载配置失败:', error);
                showToast('加载配置失败', 'error');
            }
        }

        // 保存配置
        async function saveConfig() {
            if (!siteConfig) {
                showToast('配置加载失败，无法保存', 'error');
                return;
            }

            // 更新邀请配置
            siteConfig.invite.enabled = document.getElementById('inviteEnabled').checked;
            siteConfig.invite.url = document.getElementById('inviteUrl').value.trim();
            siteConfig.invite.buttonText = document.getElementById('inviteButtonText').value.trim() || '下载国文汇通';
            siteConfig.invite.showInHeader = document.getElementById('inviteShowInHeader').checked;

            // 更新客服配置
            siteConfig.customerService.enabled = document.getElementById('csEnabled').checked;

            siteConfig.customerService.services = [
                {
                    id: 'cs1',
                    name: document.getElementById('cs1Name').value.trim() || '官方客服1',
                    title: document.getElementById('cs1Title').value.trim() || '扫码添加官方客服',
                    description: document.getElementById('cs1Description').value.trim(),
                    qrcode: document.getElementById('cs1Qrcode').value.trim(),
                    visible: document.getElementById('cs1Visible').checked
                },
                {
                    id: 'cs2',
                    name: document.getElementById('cs2Name').value.trim() || '官方客服2',
                    title: document.getElementById('cs2Title').value.trim() || '扫码添加技术支持',
                    description: document.getElementById('cs2Description').value.trim(),
                    qrcode: document.getElementById('cs2Qrcode').value.trim(),
                    visible: document.getElementById('cs2Visible').checked
                }
            ];

            // 更新站点信息
            siteConfig.site.name = document.getElementById('siteName').value.trim() || '国文汇通';
            siteConfig.site.description = document.getElementById('siteDescription').value.trim();
            siteConfig.site.keywords = document.getElementById('siteKeywords').value.trim();
            siteConfig.site.domain = document.getElementById('siteDomain').value.trim();

            showToast('配置已保存（演示模式，实际项目中需要后端接口）', 'success');
            console.log('保存的配置:', siteConfig);
        }

        // 切换配置标签
        function switchConfigTab(tabName) {
            // 更新标签按钮状态
            document.querySelectorAll('.config-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // 更新面板显示
            document.querySelectorAll('.config-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.getElementById(`configPanel-${tabName}`).classList.add('active');
        }

        // 页面加载
        window.onload = function() {
            checkLoginStatus();
            loadDocuments();
        };
    </script>
</body>
</html>
