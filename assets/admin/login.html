<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>管理员登录 - 国文汇通</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%236366f1'/><stop offset='100%' style='stop-color:%23a855f7'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23grad)'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='white'>🔐</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --accent: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --shadow-glow: 0 0 60px rgba(99, 102, 241, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--darker);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 {
            width: 700px;
            height: 700px;
            background: var(--primary);
            top: -250px;
            left: -250px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: var(--secondary);
            bottom: -200px;
            right: -200px;
            animation-delay: -8s;
        }

        .orb-3 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -16s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(60px, -60px) scale(1.15);
            }
            50% {
                transform: translate(-60px, 60px) scale(0.85);
            }
            75% {
                transform: translate(60px, 60px) scale(1.1);
            }
        }

        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* 登录容器 */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 50px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), var(--shadow-glow);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
            }
            50% {
                box-shadow: 0 0 60px rgba(99, 102, 241, 0.6);
            }
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .login-header p {
            font-size: 16px;
            color: var(--light);
            opacity: 0.6;
        }

        /* 表单 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--light);
            opacity: 0.9;
        }

        .form-group input {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            color: var(--light);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-group input::placeholder {
            color: var(--light);
            opacity: 0.4;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), var(--shadow-glow);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: var(--gradient);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.6);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* 错误信息 */
        .error-message {
            color: var(--danger);
            font-size: 14px;
            text-align: center;
            margin-top: -15px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 安全提示 */
        .security-badge {
            margin-top: 30px;
            padding: 16px 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            color: var(--success);
            font-weight: 500;
        }

        /* 页脚链接 */
        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
        }

        .footer-links a {
            color: var(--light);
            opacity: 0.6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--primary-light);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .login-card {
                padding: 40px 30px;
                border-radius: 24px;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .logo-icon {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }

            .form-group input {
                padding: 16px 20px;
                font-size: 15px;
            }

            .submit-btn {
                padding: 18px;
                font-size: 16px;
            }
        }

        /* 加载动画 */
        .loading {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .loading.active {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="dynamic-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- 网格背景 -->
    <div class="grid-bg"></div>

    <!-- 登录容器 -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">🔐</div>
                <h1>管理员登录</h1>
                <p>请输入管理员凭据以访问后台系统</p>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="请输入用户名"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="请输入密码"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text" id="btnText">登录后台</span>
                    <span class="loading" id="loading"></span>
                </button>

                <div class="error-message" id="errorMessage"></div>
            </form>

            <div class="security-badge">
                <span>🛡️</span>
                <span>企业级安全加密 · SSL/TLS 保护</span>
            </div>

            <div class="footer-links">
                <a href="/index.html">← 返回首页</a>
                <a href="#" onclick="alert('安全特性：\n\n✓ SHA-256 密码加密\n✓ 会话令牌保护\n✓ HTTPS 传输\n✓ CSRF 防护\n✓ XSS 防护')">安全说明</a>
            </div>
        </div>
    </div>

    <script>
        // 加密工具
        const CryptoUtils = {
            hash: async function(str) {
                const encoder = new TextEncoder();
                const data = encoder.encode(str);
                const hash = await crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(hash))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');
            },

            encode: function(str) {
                return btoa(encodeURIComponent(str));
            },

            decode: function(str) {
                try {
                    return JSON.parse(decodeURIComponent(atob(str)));
                } catch (e) {
                    return null;
                }
            }
        };

        // 管理员凭据
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            passwordHash: '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'
        };

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');

            // 显示加载状态
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            loading.classList.add('active');

            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 1200));

            try {
                // 验证用户名
                if (username !== ADMIN_CREDENTIALS.username) {
                    throw new Error('用户名或密码错误');
                }

                // 验证密码
                const passwordHash = await CryptoUtils.hash(password);

                if (passwordHash !== ADMIN_CREDENTIALS.passwordHash) {
                    throw new Error('用户名或密码错误');
                }

                // 创建会话
                const sessionData = {
                    username: username,
                    timestamp: Date.now(),
                    token: generateToken(),
                    expiresAt: Date.now() + 24 * 60 * 60 * 1000
                };

                // 存储会话
                const encrypted = CryptoUtils.encode(JSON.stringify(sessionData));
                sessionStorage.setItem('adminSession', encrypted);

                // 跳转到管理后台
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');

                // 错误动画
                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    card.style.animation = '';
                }, 500);
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                loading.classList.remove('active');
            }
        }

        // 生成令牌
        function generateToken() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return Array.from(array)
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // 添加摇晃动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-12px); }
                40% { transform: translateX(12px); }
                60% { transform: translateX(-12px); }
                80% { transform: translateX(12px); }
            }
        `;
        document.head.appendChild(style);

        // 检查已登录
        window.onload = function() {
            if (sessionStorage.getItem('adminSession')) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
