<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="robots" content="noindex, nofollow">
    <title>登录 - 国文汇通管理后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%236366f1'/><stop offset='100%' style='stop-color:%23ec4899'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23grad)'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='white'>⚙️</text></svg>">
    <style>
        /* ==================== 全局变量 ==================== */
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #a855f7;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --lighter: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: 20px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.4);
            --shadow-glow-purple: 0 0 60px rgba(168, 85, 247, 0.3);
            --shadow-glow-pink: 0 0 60px rgba(236, 72, 153, 0.3);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --transition-fast: 150ms ease;
            --transition-base: 300ms ease;
            --transition-slow: 500ms ease;
        }

        /* ==================== 全局重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                        "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB",
                        "Microsoft YaHei", sans-serif;
            background: var(--darker);
            color: var(--lighter);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==================== 粒子背景容器 ==================== */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        #particles-canvas {
            width: 100%;
            height: 100%;
        }

        /* ==================== 登录页面容器 ==================== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ==================== 登录卡片 ==================== */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-2xl);
            padding: 3rem;
            box-shadow: var(--shadow-2xl);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: var(--shadow-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: var(--gray-400);
            font-size: 1rem;
        }

        /* ==================== 表单 ==================== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gray-300);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-right: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-xl);
            color: var(--lighter);
            font-size: 1rem;
            transition: all var(--transition-base);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--gray-500);
        }

        .form-input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: var(--gray-400);
        }

        .form-input:focus + .form-input-icon {
            color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-400);
            cursor: pointer;
        }

        .form-checkbox input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .form-link {
            color: var(--primary-light);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .form-link:hover {
            color: var(--primary);
        }

        .form-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-xl);
            color: var(--lighter);
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .form-button:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow-purple);
        }

        .form-button:active {
            transform: translateY(-1px);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== 错误提示 ==================== */
        .form-error {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            animation: shake 0.5s ease;
        }

        .form-error.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ==================== 返回主页链接 ==================== */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-400);
            font-size: 0.875rem;
        }

        .login-footer a {
            color: var(--primary-light);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .login-footer a:hover {
            color: var(--primary);
        }

        /* ==================== 响应式设计 ==================== */
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .login-logo {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
        }

        /* ==================== 加载动画 ==================== */
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--lighter);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-container">
        <canvas id="particles-canvas"></canvas>
    </div>

    <!-- 登录页面容器 -->
    <div class="login-container">
        <div class="login-card">
            <!-- 头部 -->
            <div class="login-header">
                <div class="login-logo">🔐</div>
                <h1 class="login-title">管理后台</h1>
                <p class="login-subtitle">登录以访问管理功能</p>
            </div>

            <!-- 登录表单 -->
            <form class="login-form" id="login-form">
                <!-- 用户名 -->
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        required
                        autocomplete="username"
                    >
                    <span class="form-input-icon">👤</span>
                </div>

                <!-- 密码 -->
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="请输入密码"
                        required
                        autocomplete="current-password"
                    >
                    <span class="form-input-icon">🔑</span>
                </div>

                <!-- 选项 -->
                <div class="form-options">
                    <label class="form-checkbox">
                        <input type="checkbox" id="remember">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="form-link">忘记密码？</a>
                </div>

                <!-- 错误提示 -->
                <div class="form-error" id="form-error">用户名或密码错误</div>

                <!-- 提交按钮 -->
                <button type="submit" class="form-button" id="submit-btn">
                    <span>登录</span>
                    <span>→</span>
                </button>
            </form>

            <!-- 底部 -->
            <div class="login-footer">
                <p>返回 <a href="/">主页</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/security-config.js"></script>
    <script>
        // ==================== 粒子系统 ====================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = `rgba(99, 102, 241, ${this.opacity})`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 绘制连线
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - distance / 150)})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // ==================== 登录表单处理 ====================
        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const formError = document.getElementById('form-error');

        // 验证凭据
        const validCredentials = {
            username: 'admin',
            password: 'admin888'
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // 显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner"></div>';
            formError.classList.remove('show');

            // 模拟 API 请求延迟
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 验证凭据
            if (username === validCredentials.username && password === validCredentials.password) {
                // 登录成功
                const sessionData = {
                    username: username,
                    loginTime: new Date().toISOString(),
                    remember: remember
                };

                // 加密存储 Session
                const encryptedSession = btoa(JSON.stringify(sessionData));
                sessionStorage.setItem('adminSession', encryptedSession);

                if (remember) {
                    localStorage.setItem('adminSession', encryptedSession);
                }

                // 跳转到仪表板
                window.location.href = '/admin/dashboard.html';
            } else {
                // 登录失败
                formError.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>登录</span><span>→</span>';

                // 震动动画
                const form = document.querySelector('.login-card');
                form.style.animation = 'none';
                setTimeout(() => {
                    form.style.animation = 'shake 0.5s ease';
                }, 10);
            }
        });

        // 实时输入验证
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        usernameInput.addEventListener('input', () => {
            formError.classList.remove('show');
        });

        passwordInput.addEventListener('input', () => {
            formError.classList.remove('show');
        });

        // 检查是否已登录
        window.addEventListener('load', () => {
            const session = sessionStorage.getItem('adminSession') || localStorage.getItem('adminSession');
            if (session) {
                window.location.href = '/admin/dashboard.html';
            }
        });

        console.log('🔐 国文汇通 - 管理后台登录系统');
        console.log('Version 2.0 - Ultra Edition');
    </script>
</body>
</html>
