<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="description" content="国文汇通 - 一站式企业知识管理平台，提供文档管理、协作办公、智能检索等企业级解决方案">
    <meta name="keywords" content="国文汇通,知识管理,企业文档,协作平台,智能检索">
    <meta name="author" content="国文汇通">
    <meta property="og:title" content="国文汇通 - 企业知识管理平台">
    <meta property="og:description" content="一站式企业知识管理解决方案，提升团队协作效率">
    <meta property="og:type" content="website">
    <title>国文汇通 - 企业知识管理平台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea'/><stop offset='100%' style='stop-color:%23764ba2'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23grad)'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='white'>📚</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #a855f7;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --lighter: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            --gradient-3: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --shadow-1: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-2: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-3: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--darker);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 动态背景 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(50px, -50px) scale(1.1);
            }
            50% {
                transform: translate(-50px, 50px) scale(0.9);
            }
            75% {
                transform: translate(50px, 50px) scale(1.05);
            }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particle-float 15s infinite linear;
        }

        @keyframes particle-float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.8);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .nav-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* 按钮样式 */
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: var(--gradient-3);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.5);
        }

        /* Hero 区域 */
        .hero {
            padding: 120px 0 80px;
            text-align: center;
            position: relative;
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 30px;
            font-size: 14px;
            color: var(--primary-light);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero h1 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .hero p {
            font-size: clamp(16px, 2vw, 20px);
            color: var(--light);
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto 40px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin: 80px 0;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-3), var(--shadow-glow);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .stat-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 16px;
            color: var(--light);
            opacity: 0.7;
            font-weight: 500;
        }

        /* 文档网格 */
        .documents-section {
            padding: 80px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            margin-bottom: 16px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            font-size: 18px;
            color: var(--light);
            opacity: 0.7;
        }

        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
        }

        .doc-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .doc-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .doc-card:hover::before {
            opacity: 0.05;
        }

        .doc-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-3), var(--shadow-glow);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .doc-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .doc-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--light);
        }

        .doc-card p {
            font-size: 15px;
            color: var(--light);
            opacity: 0.7;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .doc-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--light);
            opacity: 0.6;
        }

        .doc-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .doc-actions {
            display: flex;
            gap: 12px;
        }

        .doc-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 12px 20px;
            font-size: 14px;
        }

        /* 客服组件 */
        .customer-service {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .cs-toggle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--gradient-1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: var(--shadow-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse 2s infinite;
        }

        .cs-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.6);
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
            }
            50% {
                box-shadow: 0 0 60px rgba(99, 102, 241, 0.6);
            }
        }

        /* 页脚 */
        .footer {
            margin-top: 120px;
            padding: 60px 0 30px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .footer p {
            color: var(--light);
            opacity: 0.6;
            font-size: 14px;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 0;
            }

            .logo {
                font-size: 20px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .nav-actions {
                gap: 10px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }

            .hero {
                padding: 80px 0 60px;
            }

            .documents-grid {
                grid-template-columns: 1fr;
            }

            .customer-service {
                bottom: 20px;
                right: 20px;
            }

            .cs-toggle {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="dynamic-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- 粒子效果 -->
    <div class="particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>国文汇通</span>
            </div>
            <div class="nav-actions">
                <a href="https://invite.x.gwht.jscaee.cn/signup?inviteCode=HBEV2B" target="_blank" class="btn btn-success">
                    <span>🚀</span>
                    <span>立即体验</span>
                </a>
            </div>
        </nav>

        <!-- Hero 区域 -->
        <section class="hero">
            <div class="hero-badge">✨ 企业级知识管理解决方案</div>
            <h1>让知识管理<br>变得简单高效</h1>
            <p>国文汇通提供一站式企业知识管理平台，帮助团队高效协作、智能检索、安全共享文档数据</p>
            <div class="hero-actions">
                <a href="https://invite.x.gwht.jscaee.cn/signup?inviteCode=HBEV2B" target="_blank" class="btn btn-primary">
                    <span>📥</span>
                    <span>免费下载</span>
                </a>
                <a href="#documents" class="btn btn-secondary">
                    <span>👀</span>
                    <span>了解更多</span>
                </a>
            </div>
        </section>

        <!-- 统计数据 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-number">1,000+</div>
                <div class="stat-label">企业文档</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-number">50,000+</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-number">100TB+</div>
                <div class="stat-label">存储空间</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬇️</div>
                <div class="stat-number">1M+</div>
                <div class="stat-label">下载次数</div>
            </div>
        </div>

        <!-- 文档区域 -->
        <section class="documents-section" id="documents">
            <div class="section-header">
                <h2>热门文档</h2>
                <p>精选企业级解决方案文档，助力业务增长</p>
            </div>
            <div class="documents-grid" id="documentsGrid">
                <!-- 动态生成文档卡片 -->
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2024 国文汇通 · 企业知识管理平台</p>
            <p style="margin-top: 8px; font-size: 12px; opacity: 0.5;">让知识驱动创新</p>
        </footer>
    </div>

    <!-- 客服组件 -->
    <div class="customer-service">
        <button class="cs-toggle" onclick="alert('客服功能配置中，请稍后访问')">💬</button>
    </div>

    <script>
        // 创建粒子效果
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 60;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = 0.3 + Math.random() * 0.4;
                container.appendChild(particle);
            }
        }

        // 文档数据
        const documents = [
            {
                id: 1,
                title: '企业知识管理白皮书',
                description: '全面解析企业知识管理的最佳实践，包括知识库构建、协作流程、安全策略等核心内容',
                icon: '📘',
                downloads: '50K+',
                category: '产品白皮书'
            },
            {
                id: 2,
                title: '技术架构设计指南',
                description: '深入解析微服务架构、云原生技术、DevOps实践，助力企业数字化转型',
                icon: '🔧',
                downloads: '35K+',
                category: '技术文档'
            },
            {
                id: 3,
                title: '用户操作手册',
                description: '详细的产品使用指南，包含功能介绍、操作步骤、常见问题解答',
                icon: '📕',
                downloads: '80K+',
                category: '用户手册'
            },
            {
                id: 4,
                title: 'API 开发者文档',
                description: '完整的 API 接口文档，包含认证方式、接口列表、参数说明、示例代码',
                icon: '💻',
                downloads: '25K+',
                category: 'API文档'
            },
            {
                id: 5,
                title: '安全合规指南',
                description: '企业数据安全合规指南，涵盖数据保护、隐私合规、安全审计等内容',
                icon: '🛡️',
                downloads: '40K+',
                category: '安全文档'
            },
            {
                id: 6,
                title: 'UI/UX 设计规范',
                description: '企业级 UI/UX 设计规范，包含设计原则、组件库、色彩系统、交互规范',
                icon: '🎨',
                downloads: '30K+',
                category: '设计规范'
            }
        ];

        // 渲染文档卡片
        function renderDocuments() {
            const container = document.getElementById('documentsGrid');
            container.innerHTML = documents.map((doc, index) => `
                <div class="doc-card" style="animation: fadeInUp 0.6s ease-out ${index * 0.1}s both;">
                    <div class="doc-icon">${doc.icon}</div>
                    <h3>${doc.title}</h3>
